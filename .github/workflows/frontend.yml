name: Frontend Quality

on:
  push:
    branches:
      - "*"
    paths:
      - "gui-pro/src/**"
      - "gui-pro/package.json"
      - "gui-pro/package-lock.json"
      - "gui-pro/tsconfig.json"
      - "gui-pro/vite.config.ts"
      - "gui-pro/eslint.config.js"
      - "gui-light/src/**"
      - "gui-light/package.json"
      - "gui-light/package-lock.json"
      - "gui-light/tsconfig.json"
      - "gui-light/vite.config.ts"
      - "gui-light/eslint.config.js"
  pull_request:
    types: [opened, reopened, synchronize]
  workflow_dispatch:

jobs:
  gui-pro:
    runs-on: ubuntu-latest
    if: "!startsWith(github.event.head_commit.message, 'skipci:')"
    defaults:
      run:
        working-directory: gui-pro
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: gui-pro/package-lock.json

      - run: npm ci --legacy-peer-deps

      - name: TypeScript check
        run: npm run typecheck

      - name: ESLint
        run: npm run lint

      - name: Vitest
        run: npm run test

  gui-light:
    runs-on: ubuntu-latest
    if: "!startsWith(github.event.head_commit.message, 'skipci:')"
    defaults:
      run:
        working-directory: gui-light
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: gui-light/package-lock.json

      - run: npm ci --legacy-peer-deps

      - name: TypeScript check
        run: npm run typecheck

      - name: ESLint
        run: npm run lint
