---
version: 2
plan:
  project-key: CL
  key: VLRLIT
  name: VpnLibs - Run Live Integration Tests
stages:
  - Build stage:
      manual: false
      final: false
      jobs:
        - Build binaries
  - Tests stage:
      manual: false
      final: false
      jobs:
        - Run live integration tests
Build binaries:
  key: BB
  description: Build client and endpoint binaries
  docker:
    image: adguard/core-libs:2.8
  tasks:
    - !include docker-clean.yaml
    - checkout:
        repository: core-libs/vpn-libs
        path: vpn-libs
        force-clean-build: 'true'
        description: Checkout client
    - checkout:
        repository: core-libs/vpn-libs-endpoint
        path: vpn-libs-endpoint
        force-clean-build: 'true'
        description: Checkout endpoint
    - script:
        interpreter: SHELL
        scripts:
          - |-
            #!/bin/bash

            set -x -e

            pwd
            ls -l
            mkdir -p output
            export OUTPUT_DIR=${PWD}/output
            export SOURCE_DIR=${PWD}

            export CONAN_REPO_URL=${bamboo.conanRepoUrl}
            vpn-libs/integration-tests/build_client.sh
            vpn-libs/integration-tests/build_endpoint.sh
  requirements:
    - adg-privileged-docker
  artifacts:
    - name: trusttunnel_client
      location: output
      pattern: trusttunnel_client
      shared: true
    - name: vpn_endpoint
      location: output
      pattern: trusttunnel_endpoint
      shared: true
  artifact-subscriptions: [ ]
Run live integration tests:
  key: RLIT
  description: Runs live integration tests
  docker:
    image: adguard/core-libs-testing:2.8.1
    docker-run-arguments: [ --privileged, --device=/dev/net/tun ]
  artifact-subscriptions:
    - artifact: trusttunnel_client
      destination: output
    - artifact: vpn_endpoint
      destination: output
  tasks:
    - script: rm -rf vpn-libs
    - checkout:
        repository: core-libs/vpn-libs
        path: vpn-libs
        force-clean-build: 'true'
        description: Checkout client
    - script:
        interpreter: SHELL
        scripts:
          - |-
            #!/bin/bash

            set -x -e

            export OUTPUT_DIR=${PWD}/output
            export TEST_DIR=${PWD}/vpn-libs/integration-tests/tests
            export LIVE_TESTS=1

            # Nameserver with global routable IP is required here.
            # 94.140.14.140 is AdGuard Unfiltered DNS
            echo nameserver 94.140.14.140 > /etc/resolv.conf

            ${TEST_DIR}/main/run.sh http2 socks
            ${TEST_DIR}/main/run.sh http3 socks
            ${TEST_DIR}/main/run.sh http2 tun
            ${TEST_DIR}/main/run.sh http3 tun
  final-tasks:
    - script:
        interpreter: SHELL
        scripts:
          - |-
            #!/bin/bash

            set -x

            pushd output

            for log_file in vpn_tun_http2.log vpn_tun_http3.log vpn_socks_http2.log vpn_socks_http3.log; do
            timeout 10s gzip -f $log_file
            if [ $? -eq 124 ]; then
              truncate -s 100M $log_file
              timeout 10s gzip -f $log_file || true
            fi
            done

            popd
        description: Gzip logs
    - script:
        interpreter: SHELL
        scripts:
          - |-
            #!/bin/bash

            pushd output
            rm -f vpn_tun_http2.log
            rm -f vpn_tun_http3.log
            rm -f vpn_socks_http2.log
            rm -f vpn_socks_http3.log
            popd
        description: Cleanup
  requirements:
    - adg-privileged-docker
  artifacts:
    - name: Vpn-Libs Log
      location: output
      pattern: '*.gz'
      shared: false
repositories:
  - core-libs/vpn-libs:
      scope: global
  - core-libs/vpn-libs-endpoint:
      scope: global
triggers:
  - cron:
      expression: 0 0 9 ? * *
branches:
  create: manually
  delete: never
  link-to-jira: true
notifications:
  - events:
      - plan-failed
    recipients:
      - webhook:
          name: Build webhook
          url: http://prod.jirahub.service.eu.consul/v1/webhook/bamboo?channel=adguard-libs
  - events:
      - plan-completed
    recipients:
      - webhook:
          name: Build webhook
          url: http://prod.jirahub.service.eu.consul/v1/webhook/bamboo?channel=adguard-libs-vcs
labels: [ ]
other:
  concurrent-build-plugin: system-default
